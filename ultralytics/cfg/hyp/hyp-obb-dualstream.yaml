# Ultralytics YOLOv8 Dual-Stream OBB Hyperparameters
# 有向边界框 (Oriented Bounding Boxes) 数据增强配置文件
# 适用于可见光 + 红外双光融合目标检测任务

# ======================================================================================================================
#  数据增强适用性分析
# ======================================================================================================================
# 
# ✅ 可直接应用的增强方法:
#   - RandomHSV: 颜色空间增强，不影响几何形状
#   - LetterBox: Resize + Padding，需要更新 OBB 坐标
#   - RandomFlip: 水平/垂直翻转，需要镜像 OBB 坐标
#   - RandomLoadText: 文本增强（多模态任务）
#
# ⚠️ 需要特殊处理的增强方法:
#   - RandomPerspective: 透视变换需要 8 点坐标变换逻辑
#   - Mosaic: 马赛克增强需要处理 4 张图的 OBB 坐标拼接
#   - MixUp/CutMix: 混合增强需要融合 OBB 标签
#
# ❌ 不建议使用的增强方法:
#   - Albumentations 空间变换: 默认不支持 OBB 格式
#   - 分类专用增强: AutoAugment, Erasing 等
#
# ======================================================================================================================

# ----------------------------------------------------------------------
# 基础超参数 (Basic Hyperparameters)
# ----------------------------------------------------------------------
lr0: 0.01                      # 初始学习率 (SGD=1e-2, Adam/AdamW=1e-3)
lrf: 0.01                      # 最终学习率衰减系数 (final LR = lr0 * lrf)
momentum: 0.937                # SGD 动量或 Adam beta1
weight_decay: 0.0005           # 权重衰减 (L2 正则化)
warmup_epochs: 3.0             # 预热轮次 (可以是小数)
warmup_momentum: 0.8           # 预热阶段动量
warmup_bias_lr: 0.1            # 预热阶段偏置学习率
box: 7.5                       # 边界框损失权重
cls: 0.5                       # 分类损失权重
dfl: 1.5                       # 分布焦点损失权重
angle: 1.0                     # OBB 角度损失权重 (旋转框专用)
nbs: 64                        # 标准批量大小 (用于损失归一化)

# ----------------------------------------------------------------------
# 颜色空间增强 (Color Space Augmentation)
# ----------------------------------------------------------------------
# ✅ 安全：不影响几何形状，可直接应用于 OBB 数据集
hsv_h: 0.015                   # HSV 色调增强幅度 (0-1)
hsv_s: 0.7                     # HSV 饱和度增强幅度 (0-1)
hsv_v: 0.4                     # HSV 亮度增强幅度 (0-1)

# ----------------------------------------------------------------------
# 几何变换 (Geometric Transformations)
# ----------------------------------------------------------------------
# ⚠️ 注意：需要实现 OBB 8 点坐标的相应变换逻辑

# 旋转增强
degrees: 0.0                   # 旋转角度范围 (±度)
                               # 建议 OBB 任务：0.0-10.0
                               # 过大旋转可能导致 OBB 坐标失真

# 平移增强
translate: 0.1                 # 平移比例 (±图像尺寸的分数)
                               # 建议 OBB 任务：0.0-0.2

# 尺度增强
scale: 0.5                     # 缩放因子范围 (1-scale 到 1+scale)
                               # 例如 scale=0.5 → [0.5, 1.5]
                               # 建议 OBB 任务：0.2-0.8

# 剪切增强
shear: 0.0                     # 剪切角度范围 (±度)
                               # 建议 OBB 任务：0.0-5.0

# 透视变换
perspective: 0.0               # 透视畸变参数 (0-0.001)
                               # ⚠️ OBB 任务慎用：需要特殊处理 8 点透视变换
                               # 建议保持为 0.0 或使用极小值

# ----------------------------------------------------------------------
# 翻转增强 (Flip Augmentations)
# ----------------------------------------------------------------------
# ✅ 安全：OBB 坐标可通过镜像变换更新
flipud: 0.0                    # 垂直翻转概率 (0-1)
                               # 建议 OBB 任务：0.0-0.5

fliplr: 0.5                    # 水平翻转概率 (0-1)
                               # 建议 OBB 任务：0.3-0.5
                               # 对船舶等对称目标效果良好

bgr: 0.0                       # RGB↔BGR 通道交换概率
                               # 建议保持 0.0 (红外图像不需要)

# ----------------------------------------------------------------------
# 混合增强 (Mix Augmentations)
# ----------------------------------------------------------------------
# ⚠️ 需要实现 OBB 标签的融合逻辑

mosaic: 0.0                    # Mosaic 增强概率 (0-1)
                               # ⚠️ OBB 任务实现复杂：需要拼接 4 张图的 OBB 坐标
                               # 建议：0.0 (暂不使用) 或需专门实现

mixup: 0.0                     # MixUp 增强概率 (0-1)
                               # ⚠️ 需要融合 OBB 标签
                               # 建议：0.0-0.1

cutmix: 0.0                    # CutMix 增强概率 (0-1)
                               # ⚠️ 需要处理裁剪区域的 OBB
                               # 建议：0.0 (暂不使用)

# ----------------------------------------------------------------------
# 分割专用增强 (Segmentation-specific)
# ----------------------------------------------------------------------
copy_paste: 0.0                # 复制粘贴增强概率 (0-1)
                               # ❌ 不适用于 OBB 检测任务
copy_paste_mode: flip          # 复制粘贴模式：flip 或 mixup

# ----------------------------------------------------------------------
# 分类专用增强 (Classification-specific)
# ----------------------------------------------------------------------
# ❌ 不建议用于 OBB 检测任务
auto_augment: randaugment      # 自动增强策略
                               # ❌ 分类专用，不推荐用于检测

erasing: 0.4                   # 随机擦除概率 (0-1)
                               # ❌ 分类专用，会破坏目标完整性

# ----------------------------------------------------------------------
# 双光融合专用参数 (Dual-Stream Specific)
# ----------------------------------------------------------------------
# 这些参数用于控制可见光和红外图像的协同增强
dual_stream_sync: True         # 同步双光变换参数
                               # True: 可见光和红外使用相同的几何变换
                               # False: 独立变换 (不推荐)

dual_stream_mosaic: False      # 双光 Mosaic 增强
                               # ⚠️ 实验性功能：需要确保可见光 - 红外图像对正确配对

# ----------------------------------------------------------------------
# OBB 专用参数 (OBB-Specific Parameters)
# ----------------------------------------------------------------------
# 针对旋转框的特殊处理参数

obb_encode_type: 'xywhr'       # OBB 编码格式
                               # 'xywhr': (center_x, center_y, width, height, angle)
                               # 'xyxyxyxy': 8 点坐标 (x1,y1,x2,y2,x3,y3,x4,y4)
                               # 当前数据集使用：xyxyxyxy

obb_angle_range: 90.0          # OBB 角度范围 (度)
                               # 90.0: [0, 90]
                               # 180.0: [0, 180]
                               # 360.0: [0, 360]

obb_coord_normalize: True      # OBB 坐标是否归一化到 [0,1]
                               # True: 归一化坐标 (YOLO 格式)
                               # False: 像素坐标

obb_validate_corners: True     # 验证 OBB 8 点坐标的有效性
                               # True: 检查坐标范围和凸包性质

# ----------------------------------------------------------------------
# 数据加载参数 (Data Loading Parameters)
# ----------------------------------------------------------------------
cache: False                   # 缓存图像到内存
                               # True/'ram': 内存缓存 (加速训练)
                               # 'disk': 磁盘缓存
                               # False: 不缓存

workers: 8                     # 数据加载线程数 (per RANK if DDP)
                               # 建议根据 CPU 核心数调整

pin_memory: False              # 使用锁页内存 (加速 GPU 传输)
                               # True: 加速但占用更多内存

# ----------------------------------------------------------------------
# 图像尺寸参数 (Image Size Parameters)
# ----------------------------------------------------------------------
imgsz: 640                     # 输入图像尺寸 (整数或 [h,w])
                               # 训练/验证：使用整数 (正方形)
                               # 预测/导出：可使用 [height, width]

multi_scale: 0.0               # 多尺度训练范围
                               # 0.0: 禁用
                               # 0.5: 随机选择 0.5-1.5 倍尺寸
                               # ⚠️ OBB 任务建议：0.0-0.3

# ======================================================================================================================
# 参数映射关系说明
# ======================================================================================================================
#
# 1. 增强方法 → 代码映射:
#    - hsv_h/s/v → RandomHSV(hgain=hsv_h, sgain=hsv_s, vgain=hsv_v)
#    - degrees → RandomPerspective(degrees=degrees)
#    - translate → RandomPerspective(translate=translate)
#    - scale → RandomPerspective(scale=scale)
#    - shear → RandomPerspective(shear=shear)
#    - perspective → RandomPerspective(perspective=perspective)
#    - flipud/fliplr → RandomFlip(hflip_prob=fliplr, vflip_prob=flipud)
#    - mosaic → Mosaic(p=mosaic)
#    - mixup → MixUp(p=mixup)
#    - cutmix → CutMix(p=cutmix)
#
# 2. OBB 坐标变换规则:
#    - LetterBox: 缩放 + 平移 8 点坐标
#    - RandomFlip: 镜像 8 点坐标 (x → w-x 或 y → h-y)
#    - RandomPerspective: 透视变换矩阵 × 8 点齐次坐标
#    - Mosaic: 拼接 4 个区域的 OBB 坐标 (需要平移 offset)
#
# 3. 双光协同增强:
#    - 可见光和红外图像必须使用相同的几何变换参数
#    - 通过 use_same_params=True 实现参数同步
#    - 颜色增强 (HSV) 可独立应用于每个模态
#
# ======================================================================================================================
# 使用示例
# ======================================================================================================================
#
# Python 代码加载:
#   ```python
#   from ultralytics.utils import IterableSimpleNamespace
#   import yaml
#   
#   with open('hyp-obb-dualstream.yaml') as f:
#       hyp_dict = yaml.safe_load(f)
#   hyp = IterableSimpleNamespace(**hyp_dict)
#   
#   # 构建数据集
#   dataset = DualStreamOBBDataset(
#       img_path='./Tship',
#       mode='train',
#       imgsz=640,
#       augment=True,
#       hyp=hyp
#   )
#   ```
#
# 训练命令:
#   yolo train model=yolov8n-obb.yaml data=tship.yaml hyp=hyp-obb-dualstream.yaml
#
# ======================================================================================================================
