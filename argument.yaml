# Dual-stream YOLOv8 OBB training configuration.

# Dataset
data: ./Tship
nc: 5

# Model
model: ultralytics/cfg/models/v8/yolov8-dualstream.yaml
weights:

# Runtime
epochs: 30
batch: 4
imgsz: 640
device: "0"
workers: 2

# Optimization
optimizer: AdamW
lr0: 0.0005
lrf: 0.01
momentum: 0.9
weight_decay: 0.0005
warmup_epochs: 5
clip_grad: 10.0

# Augmentation
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4

# Output
project: runs/dualstream-train
name: tship_exp
exist_ok: false
cache: false
resume: false
verbose: true

# Validation
val_conf: 0.001
val_iou: 0.5
max_det: 300
save_metric: mAP50-95

# Loss weights
box: 2.0
cls: 0.5
dfl: 1.5
angle: 0.1
